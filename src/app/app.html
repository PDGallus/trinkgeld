<main class="app-shell">
  <app-header-bar [title]="title()" [status]="status()" (exportBackup)="exportBackup()" (importBackup)="importBackup($event)" />

  @if (periodsStore.periods().length === 0) {
    <app-create-period
      [startDate]="newPeriod.startDate"
      [startDateError]="periodFieldErrors().startDate"
      (startDateChange)="onNewPeriodStartDateChange($event)"
      (createPeriod)="createPeriod()"
    />
  }

  <app-periods-table
    [periods]="periodsStore.sortedPeriods()"
    [selectedPeriodId]="selectedPeriodId()"
    (selectPeriod)="selectPeriod($event)"
  />

  <app-cashbox-panel
    [currentPeriod]="periodsStore.currentPeriod()"
    [deposits]="currentPeriodDeposits()"
    [cashFieldErrors]="cashFieldErrors()"
    [cashDepositAmount]="cashDepositForm.amount"
    [cashDepositDate]="cashDepositForm.date"
    (cashDepositAmountChange)="onCashDepositAmountChange($event)"
    (cashDepositDateChange)="onCashDepositDateChange($event)"
    (deposit)="depositToCurrentPeriod()"
    (deleteDeposit)="deleteDepositFromCurrentPeriod($event)"
  />

  <app-employees-panel
    [employees]="employeesStore.employees()"
    [employeeEditById]="employeeEditById()"
    [newEmployeeName]="newEmployee.name"
    [newEmployeeWeeklyHours]="newEmployee.weeklyHours"
    [employeeFieldErrors]="employeeFieldErrors()"
    (newEmployeeNameChange)="onNewEmployeeNameChange($event)"
    (newEmployeeWeeklyHoursChange)="onNewEmployeeWeeklyHoursChange($event)"
    (addEmployee)="addEmployee()"
    (updateEmployeeDraft)="onEmployeeDraftUpdate($event)"
    (saveEmployeeChanges)="saveEmployeeChanges($event)"
    (payoutAndDeactivateEmployee)="payoutAndDeactivateEmployee($event)"
    (deleteEmployee)="deleteEmployee($event)"
  />

  @if (periodDetailStore.period(); as period) {
    <app-period-detail-panel
      [period]="period"
      [shares]="periodDetailStore.shares()"
      [employeesById]="employeesById()"
      (changeHeader)="onPeriodHeaderChange($event)"
      (shareSickUnitsChange)="onShareSickUnitsChange($event.employeeId, $event.value)"
      (payoutAndCreateNextPeriod)="payoutAndCreateNextPeriod()"
    />
  }
</main>
