name: Renovate

on:
  schedule:
    # 23:00 MEST (UTC+2) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v46.1.10
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
