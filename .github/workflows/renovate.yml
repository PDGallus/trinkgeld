name: Renovate
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  repository-projects: write
  id-token: write  # Für OIDC mit GitHub Apps

jobs:
  renovate:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/heads/renovate/') && (github.event.head_commit.author.name != 'Renovate Bot' || github.event_name == 'schedule')"
    steps:
      - uses: renovatebot/github-action@v46.1.10
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: '["PDGallus/trinkgeld"]'
          RENOVATE_GIT_AUTHOR: "Renovate Bot <philip.d.hahn@gmail.com>"
